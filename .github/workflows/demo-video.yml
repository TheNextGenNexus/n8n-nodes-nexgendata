name: Demo Video

# Auto-generates the n8n verification demo video on a CI runner.
# Runs n8n (official Docker image), installs the published node via n8n's OWN REST
# API (loads + registers it, handling the peer correctly), then Playwright drives
# the UI: shows it installed, adds it to a workflow, creates+tests the credential
# (token from APIFY_TOKEN secret), runs a real action, recording one continuous video.

on:
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start n8n + install node via API
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          set -e
          docker run -d --name n8n -p 5678:5678 \
            -e N8N_USER_MANAGEMENT_DISABLED=true \
            -e N8N_COMMUNITY_PACKAGES_ENABLED=true \
            -e N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true \
            -e N8N_SECURE_COOKIE=false \
            -e N8N_DIAGNOSTICS_ENABLED=false \
            -e N8N_PERSONALIZATION_ENABLED=false \
            -e N8N_HIRING_BANNER_ENABLED=false \
            -e N8N_VERSION_NOTIFICATIONS_ENABLED=false \
            -e N8N_ONBOARDING_FLOW_DISABLED=true \
            -e GENERIC_TIMEZONE=UTC \
            docker.n8n.io/n8nio/n8n:latest
          echo "waiting for n8n health..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5678/healthz >/dev/null; then echo "n8n up"; break; fi
            sleep 3
          done
          curl -sf http://127.0.0.1:5678/healthz || (echo FAILED; docker logs n8n; exit 1)
          sleep 5
          echo "=== installing community node via n8n REST API ==="
          curl -s -X POST http://127.0.0.1:5678/rest/community-packages \
            -H "Content-Type: application/json" \
            -d '{"name":"n8n-nodes-nexgendata"}' -w "\nHTTP_CODE=%{http_code}\n" || true
          echo "=== waiting for package to load ==="
          sleep 30
          echo "=== installed community packages ==="
          curl -s http://127.0.0.1:5678/rest/community-packages -w "\nHTTP_CODE=%{http_code}\n" || true
          echo "=== docker logs tail ==="
          docker logs n8n 2>&1 | tail -15 || true

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install -D playwright@latest
          npx playwright install --with-deps chromium

      - name: Write Playwright recorder
        run: |
          cat > record.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'fs';
          const BASE = 'http://127.0.0.1:5678';
          const TOKEN = process.env.APIFY_TOKEN || '';
          fs.mkdirSync('shots', { recursive: true });
          const log = (...a) => console.log('[rec]', ...a);
          const sleep = (ms) => new Promise(r => setTimeout(r, ms));
          let n = 0;
          const shot = async (p, name) => { try { await p.screenshot({ path: `shots/${String(++n).padStart(2,'0')}-${name}.png` }); } catch {} };
          const cnt = async (loc) => { try { return await loc.count(); } catch { return -1; } };
          const browser = await chromium.launch({ args: ['--no-sandbox'] });
          const context = await browser.newContext({ viewport: { width: 1366, height: 820 }, recordVideo: { dir: 'video', size: { width: 1366, height: 820 } } });
          const page = await context.newPage();
          page.setDefaultTimeout(25000);
          async function phase(label, fn) { log('PHASE', label); try { await fn(); } catch (e) { log('ERR', label, e.message.split('\n')[0]); } await shot(page, label.replace(/\s+/g,'-')); await sleep(2500); }

          await phase('open', async () => { await page.goto(BASE, { waitUntil: 'networkidle' }); await sleep(3000); });
          await phase('community-nodes', async () => { await page.goto(BASE + '/settings/community-nodes', { waitUntil: 'networkidle' }); await sleep(3500); log('nexgendata on settings page:', await cnt(page.getByText(/nexgendata/i))); });

          await phase('new-workflow', async () => { await page.goto(BASE + '/workflow/new', { waitUntil: 'networkidle' }); await sleep(4000); });
          await phase('open-panel', async () => {
            // click empty canvas, then Tab opens the node creator (n8n shortcut)
            try { await page.mouse.click(683, 430); } catch {}
            await sleep(800);
            await page.keyboard.press('Tab');
            await sleep(3000);
            log('search inputs visible:', await cnt(page.locator('input:visible')));
          });
          await phase('search', async () => {
            // node creator search is auto-focused; type directly
            await page.keyboard.type('NexGenData', { delay: 60 });
            await sleep(3500);
            log('NexGenData items in panel:', await cnt(page.getByText(/NexGenData/i)));
          });
          await phase('add-node', async () => {
            const item = page.getByText(/NexGenData Email Verification|NexGenData Company Enrichment|NexGenData B2B|NexGenData/i).first();
            if (await cnt(item) > 0) { await item.click(); log('clicked node'); } else log('no NexGenData item to click');
            await sleep(4000);
            log('NDV open:', await cnt(page.locator('[data-test-id="ndv"], .ndv-wrapper, [class*="ndv"]')));
          });

          await phase('cred-open', async () => {
            const drop = page.locator('[data-test-id="credentials-select"], [data-test-id="credential-select"]').first()
              .or(page.getByText(/select credential|create new credential/i).first());
            if (await cnt(drop) > 0) { await drop.click(); await sleep(1500); }
            const create = page.getByText(/create new credential/i).first(); if (await cnt(create) > 0) await create.click();
            await sleep(3000);
          });
          await phase('cred-fill', async () => {
            const pwd = page.locator('input[type="password"]:visible').first();
            if (await cnt(pwd) > 0) { await pwd.fill(TOKEN); log('token filled'); } else log('no token field');
            await sleep(1500);
          });
          await phase('cred-save-test', async () => {
            const save = page.locator('[data-test-id="credential-save-button"]').first().or(page.getByRole('button', { name: /^save$/i }).first());
            if (await cnt(save) > 0) await save.click();
            await sleep(8000);
            log('tested-successfully text:', await cnt(page.getByText(/tested successfully|connection successful|credential.*saved/i)));
          });
          await phase('cred-close', async () => { const c = page.getByRole('button', { name: /back to canvas|close|done/i }).first(); if (await cnt(c) > 0) { try { await c.click(); } catch {} } await sleep(2500); });

          await phase('run', async () => {
            const exec = page.locator('[data-test-id="node-execute-button"]').first().or(page.getByRole('button', { name: /test step|execute step|execute node/i }).first());
            if (await cnt(exec) > 0) { await exec.click(); log('executed'); } else log('no execute button');
            await sleep(15000);
            log('output panel:', await cnt(page.locator('[data-test-id="ndv-output-panel"], [class*="output"]')));
          });
          await phase('output', async () => { await sleep(4000); });

          await sleep(2000); await context.close(); await browser.close(); log('done');
          JS
          echo "record.mjs written"

      - name: Record demo
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node record.mjs

      - name: Convert to MP4
        if: always()
        run: |
          ls -la video || true
          if ls video/*.webm 1>/dev/null 2>&1; then
            ffmpeg -y -i "$(ls video/*.webm | head -1)" -vf "fps=24,scale=1280:-2" -pix_fmt yuv420p demo.mp4 || cp "$(ls video/*.webm | head -1)" demo.webm
          fi
          ls -la demo.* || true

      - name: n8n container logs
        if: always()
        run: docker logs n8n 2>&1 | tail -60 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n8n-demo-video
          path: |
            demo.mp4
            demo.webm
            video/**
            shots/**
          if-no-files-found: warn
