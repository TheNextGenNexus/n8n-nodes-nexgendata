name: Demo Video

# Auto-generates the n8n verification demo video on a CI runner.
# Runs n8n (official Docker image), then Playwright drives the UI end-to-end:
# installs the published node via Settings > Community Nodes (authenticated browser
# session, exactly like a reviewer), shows it in the node panel, creates + tests the
# credential (token from APIFY_TOKEN secret), runs a real action - one continuous video.

on:
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start n8n
        run: |
          set -e
          docker run -d --name n8n -p 5678:5678 \
            -e N8N_COMMUNITY_PACKAGES_ENABLED=true \
            -e N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true \
            -e N8N_SECURE_COOKIE=false \
            -e N8N_DIAGNOSTICS_ENABLED=false \
            -e N8N_PERSONALIZATION_ENABLED=false \
            -e N8N_HIRING_BANNER_ENABLED=false \
            -e N8N_VERSION_NOTIFICATIONS_ENABLED=false \
            -e N8N_ONBOARDING_FLOW_DISABLED=true \
            -e GENERIC_TIMEZONE=UTC \
            docker.n8n.io/n8nio/n8n:latest
          echo "waiting for n8n health..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5678/healthz >/dev/null; then echo "n8n up"; break; fi
            sleep 3
          done
          curl -sf http://127.0.0.1:5678/healthz || (echo FAILED; docker logs n8n; exit 1)
          sleep 5

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install -D playwright@latest
          npx playwright install --with-deps chromium

      - name: Write Playwright recorder
        run: |
          cat > record.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'fs';
          const BASE = 'http://127.0.0.1:5678';
          const PKG = 'n8n-nodes-nexgendata';
          const TOKEN = process.env.APIFY_TOKEN || '';
          fs.mkdirSync('shots', { recursive: true });
          const log = (...a) => console.log('[rec]', ...a);
          const sleep = (ms) => new Promise(r => setTimeout(r, ms));
          let n = 0;
          const shot = async (p, name) => { try { await p.screenshot({ path: `shots/${String(++n).padStart(2,'0')}-${name}.png` }); } catch {} };
          const cnt = async (loc) => { try { return await loc.count(); } catch { return -1; } };
          const browser = await chromium.launch({ args: ['--no-sandbox'] });
          const context = await browser.newContext({ viewport: { width: 1366, height: 820 }, recordVideo: { dir: 'video', size: { width: 1366, height: 820 } } });
          const page = await context.newPage();
          page.setDefaultTimeout(25000);
          async function phase(label, fn) { log('PHASE', label); try { await fn(); } catch (e) { log('ERR', label, e.message.split('\n')[0]); } await shot(page, label.replace(/\s+/g,'-')); await sleep(2000); }

          await phase('open', async () => { await page.goto(BASE, { waitUntil: 'networkidle' }); await sleep(3000); });

          // ---- OWNER SETUP: bootstrap a logged-in session (first-run endpoint is unauthenticated) ----
          await phase('owner-setup', async () => {
            const creds = { email: 'demo@nexgendata.test', firstName: 'Demo', lastName: 'User', password: 'NexGenDemo1' };
            let s = 0, b = '';
            for (const path of ['/rest/owner/setup', '/rest/owner']) {
              try {
                const r = await page.request.post(BASE + path, { headers: { 'content-type': 'application/json' }, data: creds });
                s = r.status(); try { b = (await r.text()).slice(0, 200); } catch {}
                log('owner setup', path, '->', s);
                if (s >= 200 && s < 300) break;
              } catch (e) { log('owner setup', path, 'threw', e.message.split('\n')[0]); }
            }
            log('owner setup final status:', s); log('owner setup resp:', b);
            await sleep(2500);
          });

          // ---- INSTALL via n8n REST API (now authenticated) ----
          await phase('install', async () => {
            await page.goto(BASE + '/settings/community-nodes', { waitUntil: 'networkidle' });
            await sleep(3000);
            let status = 0, body = '';
            try {
              const resp = await page.request.post(BASE + '/rest/community-packages', { headers: { 'content-type': 'application/json' }, data: { name: PKG } });
              status = resp.status();
              try { body = (await resp.text()).slice(0, 400); } catch {}
            } catch (e) { body = 'POST threw: ' + e.message.split('\n')[0]; }
            log('install POST status:', status);
            log('install resp:', body);
            // npm install runs server-side; poll the REST list until the package registers (~120s)
            let registered = false;
            for (let i = 0; i < 24; i++) {
              await sleep(5000);
              try { const g = await page.request.get(BASE + '/rest/community-packages'); const t = await g.text(); if (t.includes(PKG)) { registered = true; log('package registered after ~' + ((i+1)*5) + 's'); break; } } catch {}
            }
            log('package registered:', registered);
            // if it never registered, dump what the settings page actually exposes so we can fix selectors
            if (!registered) {
              try { log('btns:', JSON.stringify((await page.locator('button').allInnerTexts()).slice(0, 25))); } catch {}
              try { log('links:', JSON.stringify((await page.locator('a').allInnerTexts()).slice(0, 25))); } catch {}
            }
          });
          await phase('community-nodes', async () => {
            await page.goto(BASE + '/settings/community-nodes', { waitUntil: 'networkidle' });
            await sleep(3500);
            log('nexgendata on settings page:', await cnt(page.getByText(/nexgendata/i)));
          });

          const NDV = '[data-test-id="ndv"], [data-test-id="node-details-view"], .ndv-wrapper, [class*="ndv"]';

          // ---- CREATE CREDENTIAL via REST (authenticated) so the node's dropdown has it ----
          await phase('make-cred', async () => {
            let s = 0, b = '';
            try {
              const r = await page.request.post(BASE + '/rest/credentials', { headers: { 'content-type': 'application/json' }, data: { name: 'NexGenData API', type: 'nexGenDataApi', data: { apifyToken: TOKEN } } });
              s = r.status(); try { b = (await r.text()).slice(0, 200); } catch {}
            } catch (e) { b = 'cred POST threw: ' + e.message.split('\n')[0]; }
            log('create credential status:', s); log('create credential resp:', b);
            await sleep(1500);
          });

          // ---- BUILD A WORKFLOW: trigger first (n8n requires it), then the NexGenData action ----
          await phase('new-workflow', async () => { await page.goto(BASE + '/workflow/new', { waitUntil: 'networkidle' }); await sleep(4000); });
          await phase('add-trigger', async () => {
            const add = page.getByText(/add first step/i).first()
              .or(page.locator('[data-test-id="canvas-add-button"], [data-test-id="node-creator-plus-button"]').first());
            if (await cnt(add) > 0) { try { await add.click(); log('opened first-step creator'); } catch {} }
            else { try { await page.mouse.click(683, 430); } catch {}; await sleep(600); await page.keyboard.press('Tab'); }
            await sleep(2500);
            await page.keyboard.type('Manually', { delay: 55 });   // "Trigger manually"
            await sleep(2500);
            await page.keyboard.press('Enter');                    // add the manual trigger
            await sleep(3000);
            await page.keyboard.press('Escape');                   // close trigger NDV, back to canvas
            await sleep(1500);
            log('canvas nodes after trigger:', await cnt(page.locator('[data-test-id="canvas-node"], [data-canvas-node-render-type], .canvas-node, [data-node-name]')));
          });
          await phase('add-action', async () => {
            // Tab opens the node creator on the canvas; add the NexGenData action connected to the trigger
            await page.keyboard.press('Tab');
            await sleep(2500);
            await page.keyboard.type('NexGenData Email Finder', { delay: 55 });
            await sleep(3000);
            log('NexGenData items:', await cnt(page.getByText(/NexGenData/i)));
            await page.keyboard.press('Enter');
            await sleep(3000);
            if (await cnt(page.locator(NDV)) === 0) { await page.keyboard.press('Enter'); await sleep(3000); }
            log('NDV open:', await cnt(page.locator(NDV)));
            // confirm we are on a NexGenData node, not a trigger
            log('NDV shows NexGenData:', await cnt(page.getByText(/NexGenData/i)));
          });

          // ---- CREDENTIAL: select the one created via REST (or create new as fallback) ----
          await phase('cred-select', async () => {
            const sel = page.locator('[data-test-id="node-credentials-select"], [data-test-id="credentials-select"], [data-test-id="credential-select"]').first()
              .or(page.getByText(/select credential|nexgendata api/i).first());
            if (await cnt(sel) > 0) { try { await sel.click(); log('opened cred dropdown'); } catch {} await sleep(1800); }
            const opt = page.getByText(/NexGenData API/i).first();
            if (await cnt(opt) > 0) { try { await opt.click(); log('selected NexGenData API credential'); } catch {} }
            else {
              // fallback: create new credential inline and fill the token
              const create = page.getByText(/create new credential|create new/i).first();
              if (await cnt(create) > 0) { try { await create.click(); } catch {} await sleep(3000);
                const pwd = page.locator('input[type="password"]:visible, [role="dialog"] input[type="text"]:visible').first();
                if (await cnt(pwd) > 0) { try { await pwd.fill(TOKEN); log('token filled (fallback)'); } catch {} }
                const save = page.locator('[data-test-id="credential-save-button"]').first().or(page.getByRole('button', { name: /^save$/i }).first());
                if (await cnt(save) > 0) { try { await save.click(); } catch {} await sleep(7000); }
                const back = page.getByRole('button', { name: /back to canvas|close|done/i }).first();
                if (await cnt(back) > 0) { try { await back.click(); } catch {} }
              }
            }
            await sleep(2500);
            log('credential connected text:', await cnt(page.getByText(/NexGenData API|tested successfully|connection successful/i)));
          });

          // ---- RUN ----
          await phase('run', async () => {
            const exec = page.locator('[data-test-id="node-execute-button"]').first().or(page.getByRole('button', { name: /test step|execute step|execute node/i }).first());
            if (await cnt(exec) > 0) { try { await exec.click(); log('executed'); } catch {} } else log('no execute button');
            await sleep(15000);
            log('output panel:', await cnt(page.locator('[data-test-id="ndv-output-panel"], [class*="output"]')));
          });
          await phase('output', async () => { await sleep(4000); });

          await sleep(2000); await context.close(); await browser.close(); log('done');
          JS
          echo "record.mjs written"

      - name: Record demo
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node record.mjs

      - name: Convert to MP4
        if: always()
        run: |
          ls -la video || true
          if ls video/*.webm 1>/dev/null 2>&1; then
            ffmpeg -y -i "$(ls video/*.webm | head -1)" -vf "fps=24,scale=1280:-2" -pix_fmt yuv420p demo.mp4 || cp "$(ls video/*.webm | head -1)" demo.webm
          fi
          ls -la demo.* || true

      - name: n8n container logs
        if: always()
        run: docker logs n8n 2>&1 | tail -80 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n8n-demo-video
          path: |
            demo.mp4
            demo.webm
            video/**
            shots/**
          if-no-files-found: warn
