name: Demo Video

# Builds the workflow (trigger + node + credential + domains) via n8n REST, then RUNS it
# via REST (POST /rest/workflows/{id}/run) so the Email Finder makes its real Apify call,
# then opens the finished execution in the editor so the node's output rows render. No
# fragile UI clicking for build/config/execute.

on:
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start n8n
        run: |
          set -e
          docker run -d --name n8n -p 5678:5678 \
            -e N8N_COMMUNITY_PACKAGES_ENABLED=true \
            -e N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true \
            -e EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true \
            -e EXECUTIONS_DATA_SAVE_ON_SUCCESS=all \
            -e EXECUTIONS_DATA_SAVE_ON_ERROR=all \
            -e EXECUTIONS_DATA_SAVE_ON_PROGRESS=true \
            -e N8N_SECURE_COOKIE=false \
            -e N8N_DIAGNOSTICS_ENABLED=false \
            -e N8N_PERSONALIZATION_ENABLED=false \
            -e N8N_HIRING_BANNER_ENABLED=false \
            -e N8N_VERSION_NOTIFICATIONS_ENABLED=false \
            -e N8N_ONBOARDING_FLOW_DISABLED=true \
            -e GENERIC_TIMEZONE=UTC \
            docker.n8n.io/n8nio/n8n:latest
          echo "waiting for n8n health..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5678/healthz >/dev/null; then echo "n8n up"; break; fi
            sleep 3
          done
          curl -sf http://127.0.0.1:5678/healthz || (echo FAILED; docker logs n8n; exit 1)
          sleep 5

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install -D playwright@latest
          npx playwright install --with-deps chromium

      - name: Write Playwright recorder
        run: |
          cat > record.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'fs';
          const BASE = 'http://127.0.0.1:5678';
          const PKG = 'n8n-nodes-nexgendata';
          const TOKEN = process.env.APIFY_TOKEN || '';
          fs.mkdirSync('shots', { recursive: true });
          const log = (...a) => console.log('[rec]', ...a);
          const sleep = (ms) => new Promise(r => setTimeout(r, ms));
          let n = 0;
          const shot = async (p, name) => { try { await p.screenshot({ path: `shots/${String(++n).padStart(2,'0')}-${name}.png` }); } catch {} };
          const cnt = async (loc) => { try { return await loc.count(); } catch { return -1; } };
          const browser = await chromium.launch({ args: ['--no-sandbox'] });
          const context = await browser.newContext({ viewport: { width: 1366, height: 820 }, recordVideo: { dir: 'video', size: { width: 1366, height: 820 } } });
          const page = await context.newPage();
          page.setDefaultTimeout(25000);
          async function phase(label, fn) { log('PHASE', label); try { await fn(); } catch (e) { log('ERR', label, e.message.split('\n')[0]); } await shot(page, label.replace(/\s+/g,'-')); await sleep(2000); }
          const NDV = '[data-test-id="ndv"], [class*="ndv"]';
          let credId = '', wfId = '', execId = '', wf = null;
          const openNodeFn = async () => {
            const node = page.locator('[data-test-id="canvas-node"], .vue-flow__node').filter({ hasText: /NexGenData Email Finder/i }).first();
            let opened = false;
            if (await cnt(node) > 0) { try { const box = await node.boundingBox(); if (box) { await page.mouse.dblclick(box.x + box.width / 2, box.y + box.height / 2); opened = true; } } catch {} }
            await sleep(2000);
            if (!opened || (await cnt(page.locator(NDV))) === 0) { try { await page.getByText(/NexGenData Email Finder/i).first().dblclick(); } catch {} }
            await sleep(3000);
          };

          await phase('open', async () => { await page.goto(BASE, { waitUntil: 'networkidle' }); await sleep(3000); });
          await phase('owner-setup', async () => {
            const creds = { email: 'demo@nexgendata.test', firstName: 'Demo', lastName: 'User', password: 'NexGenDemo1' };
            let s = 0;
            for (const path of ['/rest/owner/setup', '/rest/owner']) { try { const r = await page.request.post(BASE + path, { headers: { 'content-type': 'application/json' }, data: creds }); s = r.status(); if (s >= 200 && s < 300) break; } catch {} }
            log('owner setup status:', s); await sleep(2000);
          });
          await phase('install', async () => {
            await page.goto(BASE + '/settings/community-nodes', { waitUntil: 'networkidle' }); await sleep(2500);
            try { const r = await page.request.post(BASE + '/rest/community-packages', { headers: { 'content-type': 'application/json' }, data: { name: PKG } }); log('install status:', r.status()); } catch {}
            let ok = false;
            for (let i = 0; i < 24; i++) { await sleep(5000); try { const g = await page.request.get(BASE + '/rest/community-packages'); if ((await g.text()).includes(PKG)) { ok = true; break; } } catch {} }
            log('package registered:', ok);
          });
          await phase('community-nodes', async () => { await page.goto(BASE + '/settings/community-nodes', { waitUntil: 'networkidle' }); await sleep(3500); log('nexgendata on settings page:', await cnt(page.getByText(/nexgendata/i))); });
          await phase('create-cred', async () => {
            let body = '';
            try { const r = await page.request.post(BASE + '/rest/credentials', { headers: { 'content-type': 'application/json' }, data: { name: 'NexGenData API', type: 'nexGenDataApi', data: { apifyToken: TOKEN } } }); body = await r.text(); log('cred status:', r.status()); } catch {}
            try { credId = (JSON.parse(body).data || {}).id || ''; } catch {}
            log('credId:', credId);
          });
          await phase('create-workflow', async () => {
            wf = {
              name: 'NexGenData Email Finder Demo',
              nodes: [
                { parameters: {}, id: '11111111-1111-1111-1111-111111111111', name: 'Manual Trigger', type: 'n8n-nodes-base.manualTrigger', typeVersion: 1, position: [380, 300] },
                { parameters: { operation: 'find', domains: ['stripe.com'] }, id: '22222222-2222-2222-2222-222222222222', name: 'NexGenData Email Finder', type: 'n8n-nodes-nexgendata.nexGenDataEmailFinder', typeVersion: 1, position: [620, 300], credentials: { nexGenDataApi: { id: credId, name: 'NexGenData API' } } },
              ],
              connections: { 'Manual Trigger': { main: [[{ node: 'NexGenData Email Finder', type: 'main', index: 0 }]] } },
              settings: { executionOrder: 'v1', saveManualExecutions: true, saveDataSuccessExecution: 'all', saveDataErrorExecution: 'all', saveExecutionProgress: true },
            };
            let body = '';
            try { const r = await page.request.post(BASE + '/rest/workflows', { headers: { 'content-type': 'application/json' }, data: wf }); body = await r.text(); log('workflow status:', r.status()); } catch {}
            try { wfId = (JSON.parse(body).data || {}).id || ''; } catch {}
            log('wfId:', wfId);
          });
          await phase('open-workflow', async () => {
            if (wfId) { await page.goto(BASE + '/workflow/' + wfId, { waitUntil: 'networkidle' }); } else { await page.goto(BASE + '/home/workflows', { waitUntil: 'networkidle' }); }
            await sleep(4500);
            log('canvas has node:', await cnt(page.getByText(/NexGenData Email Finder/i)));
          });
          await phase('open-node', async () => {
            await openNodeFn();
            log('NDV open:', await cnt(page.locator(NDV)), 'credential:', await cnt(page.getByText(/NexGenData API/i)), 'domain:', await cnt(page.getByText(/stripe\.com/i)));
            try { await page.keyboard.press('Escape'); } catch {}
            await sleep(1500);
          });
          await phase('execute-rest', async () => {
            let s = 0, body = '';
            try { const r = await page.request.post(BASE + '/rest/workflows/' + wfId + '/run', { headers: { 'content-type': 'application/json' }, data: { workflowData: wf }, timeout: 180000 }); s = r.status(); body = (await r.text()); } catch (e) { body = 'run threw: ' + e.message.split('\n')[0]; }
            log('run status:', s);
            log('run resp head:', body.slice(0, 300));
            try { const j = JSON.parse(body); execId = (j.data && (j.data.executionId || j.data.id)) || ''; } catch {}
            // executions are now saved (env + workflow settings); poll the list until ours appears
            for (let i = 0; i < 12 && !execId; i++) {
              await sleep(4000);
              try { const g = await page.request.get(BASE + '/rest/executions?filter=' + encodeURIComponent(JSON.stringify({ workflowId: wfId }))); const jj = JSON.parse(await g.text()); const arr = (jj.data && (jj.data.results || jj.data)) || []; execId = (arr[0] || {}).id || ''; } catch {}
            }
            log('execId:', execId);
          });
          await phase('show-output', async () => {
            if (execId) { await page.goto(BASE + '/workflow/' + wfId + '/executions/' + execId, { waitUntil: 'networkidle' }); await sleep(6000); }
            else {
              await page.goto(BASE + '/workflow/' + wfId + '/executions', { waitUntil: 'networkidle' }); await sleep(4000);
              const firstExec = page.locator('[data-test-id="execution-card"], [class*="execution"]').first();
              if (await cnt(firstExec) > 0) { try { await firstExec.click(); log('clicked first execution'); } catch {} await sleep(5000); }
            }
            log('exec view; NexGenData on page:', await cnt(page.getByText(/NexGenData Email Finder/i)));
            await openNodeFn();
            await sleep(3000);
            log('output rows (@/email/domain):', await cnt(page.getByText(/@|email|"domain"|companyDomain/i)));
          });
          await phase('output', async () => { await sleep(5000); });

          await sleep(2000); await context.close(); await browser.close(); log('done');
          JS
          echo "record.mjs written"

      - name: Record demo
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node record.mjs

      - name: Convert to MP4
        if: always()
        run: |
          ls -la video || true
          if ls video/*.webm 1>/dev/null 2>&1; then
            ffmpeg -y -i "$(ls video/*.webm | head -1)" -vf "fps=24,scale=1280:-2" -pix_fmt yuv420p demo.mp4 || cp "$(ls video/*.webm | head -1)" demo.webm
          fi
          ls -la demo.* || true

      - name: n8n container logs
        if: always()
        run: docker logs n8n 2>&1 | tail -80 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n8n-demo-video
          path: |
            demo.mp4
            demo.webm
            video/**
            shots/**
          if-no-files-found: warn

      - name: Publish screenshots + video to repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ls -la shots || { echo "no shots"; exit 0; }
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/TheNextGenNexus/n8n-nodes-nexgendata.git" repo
          rm -rf repo/demo-shots
          mkdir -p repo/demo-shots
          cp shots/*.png repo/demo-shots/ 2>/dev/null || true
          cp demo.mp4 repo/demo-shots/ 2>/dev/null || true
          cp demo.webm repo/demo-shots/ 2>/dev/null || true
          cd repo
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add demo-shots
          git commit -m "demo screenshots run ${{ github.run_number }} [skip ci]" || echo "nothing to commit"
          git push origin HEAD:main || echo "push failed"
