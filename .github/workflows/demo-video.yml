name: Demo Video

# Auto-generates the n8n verification demo video on a CI runner.
# Pre-installs the published node into n8n's data volume (loads at boot), runs n8n
# from the official Docker image, then Playwright drives the UI: shows the node
# installed, adds it to a workflow, creates+tests the credential (token from the
# APIFY_TOKEN secret), runs a real action, and records one continuous video.
#
# PREREQ: repo secret APIFY_TOKEN. RUN: Actions -> Demo Video -> Run workflow.

on:
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pre-install node + start n8n (Docker)
        run: |
          set -e
          mkdir -p n8ndata/nodes
          ( cd n8ndata/nodes && npm init -y >/dev/null 2>&1 && npm install n8n-nodes-nexgendata@0.1.2 --omit=peer --no-audit --no-fund --ignore-scripts )
          echo "node package installed into volume:"; ls n8ndata/nodes/node_modules | grep nexgendata || true
          chmod -R 777 n8ndata
          docker run -d --name n8n -p 5678:5678 \
            -e N8N_USER_MANAGEMENT_DISABLED=true \
            -e N8N_COMMUNITY_PACKAGES_ENABLED=true \
            -e N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true \
            -e N8N_SECURE_COOKIE=false \
            -e N8N_DIAGNOSTICS_ENABLED=false \
            -e N8N_PERSONALIZATION_ENABLED=false \
            -e N8N_HIRING_BANNER_ENABLED=false \
            -e N8N_VERSION_NOTIFICATIONS_ENABLED=false \
            -e N8N_ONBOARDING_FLOW_DISABLED=true \
            -e GENERIC_TIMEZONE=UTC \
            -v "$PWD/n8ndata":/home/node/.n8n \
            docker.n8n.io/n8nio/n8n:latest
          echo "waiting for n8n health..."
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5678/healthz >/dev/null; then echo "n8n up"; break; fi
            sleep 3
          done
          curl -sf http://127.0.0.1:5678/healthz || (echo "FAILED"; docker logs n8n; exit 1)
          sleep 8

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install -D playwright@latest
          npx playwright install --with-deps chromium

      - name: Write Playwright recorder
        run: |
          cat > record.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'fs';
          const BASE = 'http://127.0.0.1:5678';
          const TOKEN = process.env.APIFY_TOKEN || '';
          fs.mkdirSync('shots', { recursive: true });
          const log = (...a) => console.log('[rec]', ...a);
          const sleep = (ms) => new Promise(r => setTimeout(r, ms));
          let n = 0;
          const shot = async (p, name) => { try { await p.screenshot({ path: `shots/${String(++n).padStart(2,'0')}-${name}.png` }); } catch {} };

          const browser = await chromium.launch({ args: ['--no-sandbox'] });
          const context = await browser.newContext({ viewport: { width: 1366, height: 820 }, recordVideo: { dir: 'video', size: { width: 1366, height: 820 } } });
          const page = await context.newPage();
          page.setDefaultTimeout(30000);
          async function phase(label, fn) { log('PHASE', label); try { await fn(); } catch (e) { log('ERR', label, e.message.split('\n')[0]); } await shot(page, label.replace(/\s+/g,'-')); await sleep(2500); }
          const cnt = async (loc) => { try { return await loc.count(); } catch { return -1; } };

          // 1) show the node is installed (Settings > Community Nodes)
          await phase('open', async () => { await page.goto(BASE, { waitUntil: 'networkidle' }); await sleep(3000); });
          await phase('community-nodes', async () => { await page.goto(BASE + '/settings/community-nodes', { waitUntil: 'networkidle' }); await sleep(3500); log('nexgendata text on settings:', await cnt(page.getByText(/nexgendata/i))); });

          // 2) new workflow + add the node
          await phase('new-workflow', async () => { await page.goto(BASE + '/workflow/new', { waitUntil: 'networkidle' }); await sleep(3500); });
          await phase('open-panel', async () => {
            const plus = page.locator('[data-test-id="canvas-add-button"]').first();
            if (await cnt(plus) > 0) await plus.click();
            else { const t = page.getByText(/add first step/i).first(); if (await cnt(t) > 0) await t.click(); else await page.keyboard.press('Tab'); }
            await sleep(3000);
          });
          await phase('search', async () => {
            const s = page.locator('[data-test-id="node-creator-search-bar"] input, input[placeholder*="Search" i]').first();
            await s.fill('NexGenData'); await sleep(3000);
            log('search results with NexGenData:', await cnt(page.getByText(/NexGenData/i)));
          });
          await phase('add-node', async () => {
            const item = page.locator('[data-test-id="node-creator-item-name"]', { hasText: /NexGenData/i }).first()
              .or(page.getByText(/NexGenData Email Verification|NexGenData Company Enrichment|NexGenData/i).first());
            await item.click(); await sleep(3500);
            log('NDV open:', await cnt(page.locator('[data-test-id="ndv"], .ndv-wrapper')));
          });

          // 3) credential create + test
          await phase('cred-open', async () => {
            const sel = page.locator('[data-test-id="credential-select"], [class*="credential"]').first()
              .or(page.getByText(/select credential|create new credential/i).first());
            if (await cnt(sel) > 0) await sel.click(); await sleep(1500);
            const create = page.getByText(/create new credential/i).first(); if (await cnt(create) > 0) await create.click(); await sleep(3000);
          });
          await phase('cred-fill', async () => {
            const pwd = page.locator('input[type="password"]').first();
            if (await cnt(pwd) > 0) { await pwd.fill(TOKEN); log('token filled'); } else log('no password field found');
            await sleep(1500);
          });
          await phase('cred-save-test', async () => {
            const save = page.getByRole('button', { name: /^save$/i }).first().or(page.locator('[data-test-id="credential-save-button"]').first());
            if (await cnt(save) > 0) await save.click(); await sleep(7000);
            log('test success text:', await cnt(page.getByText(/connection tested successfully|tested successfully|connection successful/i)));
          });
          await phase('cred-close', async () => { const c = page.getByRole('button', { name: /close|back to canvas|done/i }).first(); if (await cnt(c) > 0) { try { await c.click(); } catch {} } await sleep(2500); });

          // 4) run a real action
          await phase('run', async () => {
            const exec = page.getByRole('button', { name: /test step|execute step|execute node/i }).first().or(page.locator('[data-test-id="node-execute-button"]').first());
            if (await cnt(exec) > 0) { await exec.click(); log('executed'); } else log('no execute button');
            await sleep(14000);
            log('output items text:', await cnt(page.getByText(/items?\b/i)));
          });
          await phase('output', async () => { await sleep(4000); });

          await sleep(2000); await context.close(); await browser.close(); log('done');
          JS
          echo "record.mjs written"

      - name: Record demo
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node record.mjs

      - name: Convert to MP4
        if: always()
        run: |
          ls -la video || true
          if ls video/*.webm 1>/dev/null 2>&1; then
            ffmpeg -y -i "$(ls video/*.webm | head -1)" -vf "fps=24,scale=1280:-2" -pix_fmt yuv420p demo.mp4 || cp "$(ls video/*.webm | head -1)" demo.webm
          fi
          ls -la demo.* || true

      - name: n8n container logs
        if: always()
        run: docker logs n8n 2>&1 | tail -60 || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n8n-demo-video
          path: |
            demo.mp4
            demo.webm
            video/**
            shots/**
          if-no-files-found: warn
